# --------------------------------------------------
# site metadata
# --------------------------------------------------
site_name: cfd-ops
site_url: https://uahypersonics.github.io/cfd-ops
site_author: Christoph Hader
site_description: Operations for transforming, extracting, remapping, and combining CFD datasets.

# --------------------------------------------------
# github repository (adds link in top right corner)
# --------------------------------------------------
repo_name: uahypersonics/cfd-ops
repo_url: https://github.com/uahypersonics/cfd-ops
edit_uri: edit/main/docs/

# --------------------------------------------------
# theme configuration
# uses Material for MkDocs: https://squidfunk.github.io/mkdocs-material/
# --------------------------------------------------
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: blue grey
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: blue grey
      toggle:
        icon: material/weather-night
        name: Switch to system preference
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view

# --------------------------------------------------
# plugins
# --------------------------------------------------
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2
            docstring_style: google
            members_order: source

# --------------------------------------------------
# markdown extensions
# --------------------------------------------------
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - attr_list
  - md_in_html

# --------------------------------------------------
# navigation
# --------------------------------------------------
nav:
  - Home: index.md
  - Installation: installation.md
  - API Reference:
    - api/index.md
